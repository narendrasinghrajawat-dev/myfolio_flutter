name: codewithnarendra
description: "A personal portfolio Flutter application with clean architecture and Riverpod."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  
  # Navigation
  go_router: ^14.2.0
  
  # Authentication
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  google_sign_in: ^6.2.1
  
  # Networking
  dio: ^5.4.3+1
  retrofit: ^4.1.0
  json_annotation: ^4.9.0
  file_picker: ^8.1.2
  firebase_storage: ^12.3.6
  intl: ^0.19.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2
  
  # UI & Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2719.3
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  google_fonts: ^6.2.1
  
  # Utilities
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  logger: ^2.4.0
  form_validator: ^2.1.1
  flutter_dotenv: ^5.1.0
  
  # Localization
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # Code Generation
  build_runner: ^2.4.11
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  injectable_generator: ^2.4.2
  hive_generator: ^2.0.1
  
  # Testing
  mockito: ^5.4.4
  
  # Analysis
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/
